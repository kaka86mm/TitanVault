# config/frp/frpc.toml.tpl
# frp 客户端配置骨架。install.sh Phase 1 用 FRP_SERVER_ADDR / FRP_TOKEN 渲染。
#
# 留空 (无 FRP_SERVER_ADDR) 时, network.yml 的 frp 容器仍启动但连不上 server,
# 不影响其余服务。需启用穿透时填 .env 的 FRP_SERVER_ADDR/FRP_TOKEN。
serverAddr = ""
serverPort = 7000

# frp v2 TOML: auth 用 dotted key (不是 [[auth]] table array, 那会解析失败)
auth.method = "token"
auth.token = ""

# 默认穿透 Caddy (HTTP 门户)
[[proxies]]
name = "mozin-web"
type = "tcp"
localIP = "127.0.0.1"
localPort = 80
remotePort = 8080

# 按需追加更多穿透 (示例: Gitea SSH)

# config/searxng/settings.yml
# SearXNG 配置。国内网络下 google/ddg/wikipedia 等默认引擎不可达 → 0 结果,
# 改用国内可达引擎 (bing/baidu/sogou/quark/360search)。
# 挂载到 ${DATA_DIR}/searxng/settings.yml。
---
# 继承镜像默认 (引擎定义), 下面用 engines 段按国内网络筛选
use_default_settings: true

general:
  instance_name: "Mozin Search"
  debug: false

search:
  # 启用 json 格式输出 (供 agent 作为搜索后端调用 API)
  formats:
    - html
    - json
  safe_search: 0
  autocomplete: ""

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "mozin-searxng-change-me-in-production"
  # limiter: 公共实例防滥用。工作站内部用, 关掉避免挡内部 agent 调用
  limiter: false
  image_proxy: true

ui:
  # SearXNG locale 用 BCP47 + script 格式, 不支持 zh-CN。简体中文 = zh-Hans-CN。
  default_locale: "zh-Hans-CN"
  default_theme: simple

outgoing:
  # 全局走 mihomo 代理 (host 模式, allow-lan 后监听 0.0.0.0:7890)。
  # 让 google/wikipedia/duckduckgo 等国外引擎可用。
  # SearXNG 容器走 mozin bridge, 用 host-gateway:7890 访问 (需 extra_hosts 配置)。
  proxies:
    all://: "http://host-gateway:7890"
  request_timeout: 8.0
  max_request_timeout: 15.0

# 引擎筛选: 国内可达的启用, 国外不可达的禁用 (避免每次搜索都等超时)
engines:
  # === 国内可达引擎 (启用) ===
  # Bing: www.bing.com 在国内会 302→cn.bing.com, 而 SearXNG 默认 allow_redirects=false
  # 导致拿到空响应 → 0 结果。修复: 直连 cn.bing.com + 允许重定向。
  - name: bing
    disabled: false
    timeout: 8
    base_url: https://cn.bing.com
    allow_redirects: true
  - name: bing images
    disabled: false
    timeout: 8
    base_url: https://cn.bing.com
    allow_redirects: true
  # bing news/videos 用 cn.bing.com 的 ajax 接口不稳定 (0 结果), 暂时禁用
  - name: bing news
    disabled: true
  - name: bing videos
    disabled: true
  # 百度/搜狗/夸克/360: 均触发验证码或结果质量差, 禁用
  - name: baidu
    disabled: true
  - name: sogou
    disabled: true
  - name: quark
    disabled: true
  - name: 360search
    disabled: true
  # wikipedia/startpage: 国内不可达, 禁用避免每次搜索等超时
  - name: wikipedia
    disabled: true
  - name: startpage
    disabled: true

  # === 国外引擎 (现在走 mihomo 代理, 重新启用) ===
  - name: google
    disabled: false
    timeout: 8
  - name: duckduckgo
    disabled: false
    timeout: 8
  - name: wikipedia
    disabled: false
    timeout: 10
  - name: brave
    disabled: false
    timeout: 8
  # === 微信公众号文章 (搜狗微信搜索) ===
  - name: sogou weixin
    disabled: false
    timeout: 10

# .github/workflows/build-images.yml
# 构建原创镜像并推送到 GHCR (GitHub Container Registry)。
#
# 触发: 推 v* tag 时 (release), 或手动 workflow_dispatch。
# 构建的镜像:
#   - token-usage-api  (轻量, LiteLLM 用量代理)
#   - sensevoice       (FunASR ASR, ~2GB)
# 注意: mineru-rocm / aham-voice-web 不进 CI —— 它们基于官方 rocm/pytorch (~13GB),
#       且仅 gfx1151 能用 GPU, CI runner 无此硬件。用户本地 build (见各自 BUILD.md)。
name: Build Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像 tag (留空用 latest)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: token-usage-api
            context: images/token-usage-api
          - image: sensevoice
            context: images/sensevoice
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set tags
        id: tags
        run: |
          # tag push: 用 git tag 名 (v0.1.0) + latest; 手动触发: 用 input 或 latest
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.tag }}"
          fi
          IMAGE="${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ matrix.image }}"
          echo "tags=${IMAGE}:latest,${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # 多架构: token-usage-api 纯 python 可跨架构; sensevoice 依赖 funasr, 仅 amd64 验证过
          platforms: ${{ matrix.image == 'token-usage-api' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

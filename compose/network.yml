# compose/network.yml
# 第二档: 代理 / 内网穿透 (standard preset 起)
# 空配置纳入发行版, 用户在 .env 填自己的订阅/凭证:
#   mihomo  代理, config 由安装器用 MIHOMO_SUBSCRIBE_URL 拉取订阅生成
#   frp     内网穿透, frpc.toml 由安装器用 FRP_SERVER_ADDR/FRP_TOKEN 填充
#
# 留空 = 直连模式 (mihomo 仅作透明代理走 DIRECT), 不影响其余服务。
services:
  mihomo:
    image: metacubex/mihomo:latest
    profiles: [network]
    restart: unless-stopped
    network_mode: host
    cap_add: [NET_ADMIN]
    volumes:
      - ../config/mihomo/config.yaml:/root/.config/mihomo/config.yaml:ro
      - ${DATA_DIR:-/data}/mihomo:/root/.config/mihomo

    logging: &id001
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  frp:
    image: snowdreamtech/frpc:latest
    profiles: [network]
    restart: unless-stopped
    network_mode: host
    volumes:
      - ../config/frp/frpc.toml:/etc/frp/frpc.toml:ro
    logging: *id001

  # MetacubeXd — mihomo 官方面板 (Nuxt/Nitro server, 连 mihomo 的 9090 API)。
  # 走 mozin bridge 网络。NUXT_APP_BASE_URL 让 Nuxt 以 /metacube/ 子路径运行,
  # 配合 Caddy handle (不剥前缀) 反代。DEFAULT_BACKEND_URL 让面板默认连 mihomo API。
  metacubexd:
    image: ghcr.io/metacubex/metacubexd:latest
    profiles: [network]
    restart: unless-stopped
    networks: [mozin]
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      - NUXT_APP_BASE_URL=/metacube/
      - DEFAULT_BACKEND_URL=${MIHOMO_BACKEND_URL:-}
    logging: *id001

networks:
  mozin:
    driver: bridge

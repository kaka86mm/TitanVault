# compose/monitoring.yml
# 第三档: 监控 (full preset)
#   glances      系统监控 (容器化, pid:host 看全机进程)
#   uptime-kuma  服务监控 (版本 2, 2026 最新主线)
services:
  glances:
    image: nicolargo/glances:latest
    profiles: [monitoring]
    restart: unless-stopped
    pid: host
    network_mode: host
    environment:
      GLANCES_OPT: "-w"

    logging: &id001
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  uptime-kuma:
    image: louislam/uptime-kuma:2
    profiles: [monitoring]
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-/data}/uptime-kuma:/app/data
    ports: ["3001:3001"]
    networks: [mozin]
    logging: *id001

networks:
  mozin:
    driver: bridge
